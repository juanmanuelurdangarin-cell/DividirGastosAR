<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary: #6c63ff;
    --primary-dark: #5a52d5;
    --bg: #f0f2f8;
    --card: #ffffff;
    --text: #2d3142;
    --text-muted: #9094a8;
    --border: #e2e5f0;
    --radius: 18px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* SCREENS */
  .screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn .3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* LOADING */
  #screen-loading { background: linear-gradient(145deg,#6c63ff,#ff6584); justify-content: center; align-items: center; color: white; text-align: center; }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ONBOARDING */
  #screen-onboarding { background: linear-gradient(145deg,#6c63ff,#ff6584); justify-content: center; align-items: center; padding: 20px; }
  .card { background: white; border-radius: 28px; padding: 35px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
  
  /* MAIN APP SCREEN (LA QUE FALTABA) */
  .header { background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .content { padding: 20px; flex: 1; }
  .empty-state { text-align: center; margin-top: 50px; color: var(--text-muted); }
  .empty-state i { font-size: 3rem; margin-bottom: 15px; display: block; }

  /* BOTONES */
  .btn-google { width: 100%; padding: 15px; background: white; border: 2px solid var(--border); border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.2s; }
  .btn-google:active { transform: scale(0.98); }
  .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(108,99,255,0.4); border: none; cursor: pointer; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="screen-loading" class="screen active">
    <i class="fa-solid fa-receipt fa-3x"></i>
    <h1 style="margin-top:15px">DivideGastos</h1>
    <div class="spinner"></div>
    <p id="loading-msg">Iniciando...</p>
  </div>

  <div id="screen-onboarding" class="screen">
    <div class="card">
      <i class="fa-solid fa-receipt fa-3x" style="color:var(--primary)"></i>
      <h1 style="margin: 15px 0 5px">¡Bienvenido!</h1>
      <p style="color:var(--text-muted); margin-bottom:25px">Organizá tus gastos grupales fácil.</p>
      <button class="btn-google" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
        Entrar con Google
      </button>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <div class="header">
      <div>
        <small style="color:var(--text-muted); display:block">Hola,</small>
        <strong id="user-name">Usuario</strong>
      </div>
      <button onclick="logout()" style="border:none; background:none; color:var(--accent)"><i class="fa-solid fa-sign-out"></i></button>
    </div>
    <div class="content">
      <div id="history-container">
        <div class="empty-state">
          <i class="fa-solid fa-folder-open"></i>
          <p>No hay eventos creados todavía.</p>
          <p style="font-size: 0.8rem">¡Toca el botón + para empezar!</p>
        </div>
      </div>
    </div>
    <button class="fab" onclick="alert('Próximamente: Crear evento')"><i class="fa-solid fa-plus"></i></button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    let auth, db;
    const state = { user: null };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    // INICIALIZACIÓN
    function init() {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      // Capturar resultado de redirección
      auth.getRedirectResult().then(result => {
        if (result.user) {
          console.log("Login exitoso vía redirección");
        }
      }).catch(error => {
        console.error("Error redirect:", error);
        showScreen('onboarding');
      });

      // Escuchar cambios de usuario
      auth.onAuthStateChanged(user => {
        if (user) {
          state.user = user;
          document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
          showScreen('main'); // <--- AHORA SÍ TENEMOS A DONDE IR
        } else {
          showScreen('onboarding');
        }
      });
    }

    async function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      showScreen('loading');
      document.getElementById('loading-msg').innerText = "Redirigiendo a Google...";
      await auth.signInWithRedirect(provider);
    }

    function logout() {
      auth.signOut();
    }

    // Arrancar
    init();
  </script>
</body>
</html>
