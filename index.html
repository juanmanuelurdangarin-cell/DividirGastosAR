<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary: #6c63ff;
    --primary-dark: #5a52d5;
    --accent: #ff6584;
    --bg: #f0f2f8;
    --card: #ffffff;
    --text: #2d3142;
    --text-muted: #9094a8;
    --border: #e2e5f0;
    --radius: 18px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* --- PANTALLAS --- */
  .screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- LOADING --- */
  #screen-loading { background: linear-gradient(145deg, var(--primary), var(--accent)); justify-content: center; align-items: center; color: white; }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- LOGIN --- */
  #screen-onboarding { background: linear-gradient(145deg, var(--primary), var(--accent)); justify-content: center; align-items: center; padding: 20px; }
  .login-card { background: white; border-radius: 28px; padding: 40px 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
  .btn-google { width: 100%; padding: 16px; background: white; border: 2px solid var(--border); border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin-top: 25px; transition: 0.2s; }
  .btn-google:active { transform: scale(0.98); background: #f9f9f9; }

  /* --- MAIN APP (HISTORIAL) --- */
  .app-header { background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }
  .logout-btn { border: none; background: #fff1f1; color: var(--accent); padding: 8px 12px; border-radius: 8px; cursor: pointer; }
  
  .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
  .empty-state { text-align: center; margin-top: 60px; color: var(--text-muted); }
  .empty-state i { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--primary); color: white; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(108,99,255,0.4); cursor: pointer; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="screen-loading" class="screen active">
    <i class="fa-solid fa-receipt fa-3x"></i>
    <div class="spinner"></div>
  </div>

  <div id="screen-onboarding" class="screen">
    <div class="login-card">
      <i class="fa-solid fa-receipt fa-4x" style="color:var(--primary)"></i>
      <h1 style="margin-top:20px">DivideGastos</h1>
      <p style="color:var(--text-muted)">Cuentas claras, amistades largas.</p>
      <button class="btn-google" onclick="login()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
        Entrar con Google
      </button>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <header class="app-header">
      <div class="user-info">
        <img id="user-photo" src="" alt="">
        <div>
          <small style="color:var(--text-muted); display:block">Hola,</small>
          <strong id="user-name">Usuario</strong>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-sign-out"></i></button>
    </header>

    <div class="container">
      <h2 style="margin-bottom: 20px;">Mis Eventos</h2>
      <div id="event-list">
        <div class="empty-state">
          <i class="fa-solid fa-folder-open"></i>
          <p>No tenés eventos creados.</p>
          <button onclick="alert('Pronto: Crear Evento')" style="color:var(--primary); background:none; border:none; margin-top:10px; font-weight:bold; cursor:pointer">Toca el + para empezar</button>
        </div>
      </div>
    </div>

    <button class="fab" onclick="alert('Pronto: Crear Evento')"><i class="fa-solid fa-plus"></i></button>
  </div>

  <script>
    // Tu configuración oficial
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    let auth, db;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    function init() {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      // Manejar el regreso del login de Google
      auth.getRedirectResult().catch(err => console.error("Error redirect:", err));

      // Observador de usuario: EL CORAZÓN DE LA APP
      auth.onAuthStateChanged(user => {
        if (user) {
          console.log("Logueado como:", user.displayName);
          document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
          document.getElementById('user-photo').src = user.photoURL || 'https://via.placeholder.com/40';
          showScreen('main'); // <--- Esto es lo que te faltaba
        } else {
          showScreen('onboarding');
        }
      });
    }

    function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      showScreen('loading');
      auth.signInWithRedirect(provider);
    }

    function logout() {
      if(confirm('¿Querés cerrar sesión?')) {
        auth.signOut();
      }
    }

    init();
  </script>
</body>
</html>
