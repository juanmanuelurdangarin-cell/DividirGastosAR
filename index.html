<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivideGastos Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <section id="welcome-screen" class="full-screen">
            <div class="welcome-card">
                <i class="fas fa-globe-americas logo-icon"></i>
                <h2 id="welcome-msg">Bienvenido / Welcome</h2>
                
                <label>Selecciona tu Idioma / Select Language</label>
                <select id="main-lang-selector" onchange="onLanguageChange(this.value)">
                    <option value="">-- Elije Idioma --</option>
                    <option value="es">Español</option>
                    <option value="en">English</option>
                    <option value="pt">Português</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="it">Italiano</option>
                </select>

                <div id="country-wrapper" class="hidden">
                    <label id="country-label">Selecciona tu País</label>
                    <select id="main-country-selector"></select>
                    <button class="btn-main" onclick="confirmIdentity()" id="btn-continue">Continuar</button>
                </div>
            </div>
        </section>

        <header id="main-header" class="hidden">
            <div class="header-actions">
                <button class="icon-btn" onclick="showHistory()"><i class="fas fa-list-ul"></i></button>
                <button class="icon-btn" onclick="shareEventLink()"><i class="fas fa-share-nodes"></i></button>
            </div>
            <h1 id="event-title-display">DivideGastos</h1>
            <div class="currency-badge" id="currency-display">ARS</div>
        </header>

        <section id="history-screen" class="card hidden">
            <h2 data-i18n="history_title">Mis Eventos</h2>
            <div id="history-list"></div>
            <button class="btn-main" onclick="createNewEvent()" data-i18n="btn_new_event">+ Nuevo Evento</button>
        </section>

        <section id="setup-screen" class="card hidden">
            <h2 data-i18n="setup_title">Configuración</h2>
            <input type="text" id="event-title" data-i18n-placeholder="placeholder_title">
            <select id="event-currency">
                </select>
            <div class="input-group">
                <input type="text" id="friend-name" data-i18n-placeholder="placeholder_name">
                <button class="btn-secondary" onclick="addFriend()" data-i18n="btn_add">Añadir</button>
            </div>
            <ul id="friends-list"></ul>
            <button class="btn-main" onclick="startEvent()" data-i18n="btn_save_continue">Empezar</button>
        </section>

        <section id="main-screen" class="hidden">
            <nav class="tabs">
                <button class="tab-btn active" onclick="showTab('gastos')" data-i18n="tab_expenses">Gastos</button>
                <button class="tab-btn" onclick="showTab('saldos')" data-i18n="tab_balances">Saldos</button>
                <button class="tab-btn" onclick="showTab('deudas')" data-i18n="tab_payments">Pagos</button>
            </nav>
            <div id="tab-gastos" class="tab-content">
                <div id="expenses-list"></div>
                <button class="fab" onclick="openExpenseModal()">+</button>
            </div>
            <div id="tab-saldos" class="tab-content hidden"></div>
            <div id="tab-deudas" class="tab-content hidden"></div>
        </section>

        <div id="ads-container" class="fixed-ads hidden">
            <a href="https://www.pedidosya.com.ar" target="_blank" class="ad-banner">
                <div class="ad-content">
                    <i class="fas fa-motorcycle"></i>
                    <span id="ad-text">¿Hambre? Pedí en <b>PedidosYa</b></span>
                </div>
                <i class="fas fa-external-link-alt"></i>
            </a>
        </div>

        <div id="expense-modal" class="modal hidden">
            <div class="modal-content">
                <h3 data-i18n="modal_title">Nuevo Gasto</h3>
                <input type="text" id="exp-title" data-i18n-placeholder="placeholder_expense">
                <input type="number" id="exp-amount" data-i18n-placeholder="placeholder_amount" step="0.01">
                <label data-i18n="label_payer">¿Quién pagó?</label>
                <select id="exp-payer"></select>
                <label data-i18n="label_participants">¿Quiénes participan?</label>
                <div id="exp-participants"></div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeExpenseModal()" data-i18n="btn_cancel">Cerrar</button>
                    <button class="btn-main" onclick="saveExpense()" data-i18n="btn_save">Guardar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
