<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root { --primary: #6c63ff; --accent: #ff6584; --bg: #f0f2f8; --text: #2d3142; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
  .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .screen.active { display: flex; }
  .btn-google { padding: 15px 25px; background: white; border: 2px solid #ddd; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .app-header { background: white; width: 100%; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; position: fixed; top: 0; box-sizing: border-box; }
  .user-photo { width: 35px; height: 35px; border-radius: 50%; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

  <div id="screen-loading" class="screen active">
    <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color:var(--primary)"></i>
  </div>

  <div id="screen-onboarding" class="screen">
    <i class="fa-solid fa-receipt fa-4x" style="color:var(--primary); margin-bottom:20px"></i>
    <h1>DivideGastos</h1>
    <p style="color:#666; margin-bottom:30px">Ingresá para gestionar tus cuentas</p>
    <button class="btn-google" onclick="login()">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
      Continuar con Google
    </button>
  </div>

  <div id="screen-main" class="screen">
    <header class="app-header">
      <div style="display:flex; align-items:center; gap:10px">
        <img id="user-photo" class="user-photo" src="">
        <span id="user-name">Usuario</span>
      </div>
      <button onclick="logout()" style="border:none; background:none; color:var(--accent); font-weight:bold">Salir</button>
    </header>
    <div style="text-align:center">
      <i class="fa-solid fa-face-smile fa-4x" style="color:var(--primary); margin-bottom:20px"></i>
      <h2>¡Ya estás adentro!</h2>
      <p id="user-email" style="color:#666"></p>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    let auth;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    function init() {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();

      // Escuchamos el estado del usuario
      auth.onAuthStateChanged((user) => {
        if (user) {
          console.log("Sesión activa:", user.displayName);
          document.getElementById('user-name').innerText = user.displayName;
          document.getElementById('user-email').innerText = user.email;
          document.getElementById('user-photo').src = user.photoURL;
          showScreen('main');
        } else {
          showScreen('onboarding');
        }
      });
    }

    async function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        // CAMBIO CLAVE: Usamos Popup en lugar de Redirect
        await auth.signInWithPopup(provider);
      } catch (error) {
        console.error("Error en login:", error);
        alert("No se pudo iniciar sesión: " + error.message);
      }
    }

    function logout() {
      auth.signOut().then(() => window.location.reload());
    }

    window.onload = init;
  </script>
</body>
</html>
