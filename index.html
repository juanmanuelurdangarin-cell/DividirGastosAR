<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro | vMaster</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
        --accent: #ff0045; --accent-soft: rgba(255, 0, 69, 0.1);
        --green: #1de9b6; --red: #ff6584; --text: #e8eaf0; --muted: #7a7f99; --radius: 18px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
    
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 75px; }
    .user-box { display: flex; align-items: center; gap: 12px; }
    .user-box img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); }

    .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
    .card:active { transform: scale(0.98); background: var(--surface2); }
    
    .tabs-nav { display: flex; background: var(--surface2); padding: 6px; border-radius: 16px; margin-bottom: 20px; gap: 5px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--muted); font-weight: 700; cursor: pointer; border-radius: 12px; font-size: 0.75rem; }
    .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(255, 0, 69, 0.3); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: flex-end; z-index: 1000; padding: 10px; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 100%; border-radius: 28px; padding: 25px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
    
    input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 16px; border-radius: 14px; color: white; margin-bottom: 15px; font-size: 1rem; outline: none; }
    
    .btn-main { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: white; font-size: 1rem; }
    .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 28px; box-shadow: 0 10px 25px rgba(255, 0, 69, 0.4); z-index: 90; display: flex; align-items: center; justify-content: center; }

    .part-chip { display: inline-flex; align-items: center; background: var(--accent-soft); color: var(--accent); padding: 8px 14px; border-radius: 20px; margin: 0 8px 8px 0; font-size: 0.85rem; font-weight: 700; }
    .part-chip i { margin-left: 8px; cursor: pointer; }

    #screen-loading { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .loader { width: 50px; height: 50px; border: 5px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading"><div class="loader"></div></div>

<div id="screen-login" class="screen">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
        <div style="width:100px; height:100px; background:var(--accent); border-radius:30px; display:flex; align-items:center; justify-content:center; margin-bottom:25px; transform: rotate(-5deg); box-shadow: 0 15px 35px rgba(255, 0, 69, 0.3);">
            <i class="fa-solid fa-bolt-lightning fa-3x" style="color:white;"></i>
        </div>
        <h1 style="font-family:'Syne'; font-size:2.4rem; font-weight:800; line-height:1;">DivideGastos<br><span style="color:var(--accent)">PRO</span></h1>
        <p style="color:var(--muted); margin: 20px 0 40px;">Billetera grupal en tiempo real.</p>
        <button class="btn-main" onclick="login()"><i class="fa-brands fa-google"></i> Ingresar con Google</button>
    </div>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-box"><img id="header-img" src=""><div><span id="header-name" style="font-weight:800; font-family:'Syne';">Usuario</span></div></div>
        <button onclick="logout()" style="background:none; border:none; color:var(--muted);"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Syne'; font-size:1.8rem; margin-bottom:20px;">Eventos</h2>
        <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModalCreate()"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="screen-detail" class="screen">
    <header>
        <button onclick="showScreen('screen-main')" style="background:none; border:none; color:white;"><i class="fa-solid fa-chevron-left"></i></button>
        <h3 id="det-title" style="font-family:'Syne'; font-size:1.1rem; flex:1; text-align:center;">Evento</h3>
        <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent);"><i class="fa-solid fa-share-nodes"></i></button>
    </header>
    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('gastos', this)">GASTOS</button>
            <button class="tab-btn" onclick="switchTab('saldos', this)">SALDOS</button>
            <button class="tab-btn" onclick="switchTab('historial', this)">HISTORIAL</button>
        </div>
        <div id="tab-area"></div>
    </div>
    <button class="fab" onclick="openModal('modal-add-expense')"><i class="fa-solid fa-receipt"></i></button>
</div>

<div id="modal-new-event" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-new-event')">
    <div class="modal">
        <h2 style="font-family:'Syne'; margin-bottom:15px;">Crear Evento</h2>
        <input type="text" id="new-name" placeholder="Nombre del evento">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:bold;">AMIGOS:</label>
        <div id="setup-parts-list" style="margin:10px 0;"></div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="in-part-name" placeholder="Escribí nombre y dale Enter" onkeypress="if(event.key==='Enter')addPartToSetup()" style="margin-bottom:0;">
            <button onclick="addPartToSetup()" style="background:var(--accent); border:none; color:white; padding:0 20px; border-radius:14px;"><i class="fa-solid fa-plus"></i></button>
        </div>
        <select id="new-cur"><option value="ARS">ARS</option><option value="USD">USD</option></select>
        <button id="btn-create" class="btn-main" onclick="dbCreateEvent()">CREAR EVENTO</button>
    </div>
</div>

<div id="modal-add-expense" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-add-expense')">
    <div class="modal">
        <h2 style="margin-bottom:15px; font-family:'Syne';">Nuevo Gasto</h2>
        <input type="text" id="ex-desc" placeholder="¿Qué compraron?">
        <input type="number" id="ex-amount" placeholder="Monto total">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:bold;">PAGÓ:</label>
        <select id="ex-payer"></select>
        <label style="font-size:0.8rem; color:var(--muted); font-weight:bold;">PARA:</label>
        <div id="ex-list-checks" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
        <button class="btn-main" onclick="dbAddExpense()">GUARDAR GASTO</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentEvent = null;
    let activeTab = 'gastos';
    let tempParticipants = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('header-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('header-img').src = user.photoURL;
            showScreen('screen-main');
            loadEvents();
        } else { showScreen('screen-login'); }
    });

    async function login() { try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e) { alert(e.message); } }
    function logout() { auth.signOut().then(() => location.reload()); }

    function openModalCreate() {
        tempParticipants = [{id: auth.currentUser.uid, name: auth.currentUser.displayName}];
        renderSetupParts();
        openModal('modal-new-event');
    }

    function addPartToSetup() {
        const inp = document.getElementById('in-part-name');
        if(!inp.value.trim()) return;
        tempParticipants.push({id: 't_' + Date.now(), name: inp.value.trim()});
        inp.value = '';
        renderSetupParts();
    }

    function renderSetupParts() {
        document.getElementById('setup-parts-list').innerHTML = tempParticipants.map(p => `
            <span class="part-chip">${p.name} ${p.id !== auth.currentUser.uid ? `<i class="fa-solid fa-xmark" onclick="tempParticipants=tempParticipants.filter(x=>x.id!=='${p.id}');renderSetupParts()"></i>` : ''}</span>
        `).join('');
    }

    function loadEvents() {
        // CORRECCIÓN: Filtramos que TU ID esté siempre presente para mostrarte tus eventos
        db.collection('events').where('participantsIds', 'array-contains', auth.currentUser.uid)
        .onSnapshot(snap => {
            const list = document.getElementById('event-list');
            if(snap.empty) {
                list.innerHTML = `<p style="text-align:center; padding:40px; color:var(--muted);">No hay eventos.</p>`;
                return;
            }
            list.innerHTML = snap.docs.map(doc => `
                <div class="card" onclick="openEvent('${doc.id}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="font-size:1.1rem; color:white;">${doc.data().name}</b>
                        <span style="background:var(--accent-soft); color:var(--accent); padding:5px 10px; border-radius:8px; font-weight:bold;">${doc.data().currency}</span>
                    </div>
                </div>
            `).join('');
        });
    }

    async function dbCreateEvent() {
        const name = document.getElementById('new-name').value;
        if(!name) return;
        // CORRECCIÓN: Aseguramos que participantsIds contenga siempre el ID del creador
        const ids = tempParticipants.map(p => p.id);
        if(!ids.includes(auth.currentUser.uid)) ids.push(auth.currentUser.uid);

        try {
            const doc = await db.collection('events').add({
                name, currency: document.getElementById('new-cur').value,
                participantsIds: ids,
                participants: tempParticipants,
                expenses: [],
                logs: [{u: auth.currentUser.displayName, a: "creó el evento", d: Date.now()}]
            });
            closeModal('modal-new-event'); // CERRAMOS AL CREAR
            openEvent(doc.id);
        } catch(e) { alert("Error al crear."); }
    }

    function openEvent(id) {
        db.collection('events').doc(id).onSnapshot(doc => {
            if(!doc.exists) return;
            currentEvent = {id: doc.id, ...doc.data()};
            document.getElementById('det-title').innerText = currentEvent.name;
            renderExpenseForm();
            renderTab();
            showScreen('screen-detail');
        });
    }

    function renderExpenseForm() {
        document.getElementById('ex-payer').innerHTML = currentEvent.participants.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('ex-list-checks').innerHTML = currentEvent.participants.map(p => `
            <label style="display:flex; align-items:center; gap:15px; padding:15px; background:var(--surface2); border-radius:14px; margin-bottom:10px;">
                <input type="checkbox" value="${p.id}" checked class="ex-check" style="accent-color:var(--accent);"> ${p.name}
            </label>
        `).join('');
    }

    async function dbAddExpense() {
        const desc = document.getElementById('ex-desc').value;
        const amount = parseFloat(document.getElementById('ex-amount').value);
        if(!desc || !amount) return;
        const payerId = document.getElementById('ex-payer').value;
        const included = Array.from(document.querySelectorAll('.ex-check:checked')).map(c => c.value);

        const exp = { id: Date.now(), desc, amount, payerId, includedIds: included, payerName: currentEvent.participants.find(p => p.id === payerId).name, d: Date.now() };
        await db.collection('events').doc(currentEvent.id).update({
            expenses: firebase.firestore.FieldValue.arrayUnion(exp),
            logs: firebase.firestore.FieldValue.arrayUnion({u: auth.currentUser.displayName, a: `sumó ${desc}`, d: Date.now()})
        });
        closeModal('modal-add-expense'); // CERRAMOS AL GUARDAR GASTO
    }

    function switchTab(t, btn) {
        activeTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTab();
    }

    function renderTab() {
        const area = document.getElementById('tab-area');
        if(activeTab === 'gastos') {
            area.innerHTML = currentEvent.expenses.length ? currentEvent.expenses.map(e => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left:4px solid var(--accent)">
                    <div><b style="color:white;">${e.desc}</b><br><small style="color:var(--muted)">Pagó ${e.payerName}</small></div>
                    <div style="color:var(--accent); font-weight:800;">$${e.amount}</div>
                </div>
            `).join('') : '<p style="text-align:center; padding:40px; color:var(--muted);">Sin gastos.</p>';
        } else if(activeTab === 'historial') {
            area.innerHTML = currentEvent.logs.slice().reverse().map(l => `
                <div style="padding:15px 0; border-bottom:1px solid var(--border); font-size:0.85rem;">
                    <b style="color:var(--accent)">${l.u}</b> ${l.a}
                </div>
            `).join('');
        } else {
            area.innerHTML = '<p style="text-align:center; padding:40px; color:var(--muted);">Cálculos en desarrollo...</p>';
        }
    }

    function shareEvent() {
        const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id;
        if(navigator.share) navigator.share({title: currentEvent.name, url});
        else prompt("Link:", url);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { 
        document.getElementById(id).classList.remove('active'); 
        // Limpiamos los inputs al cerrar
        const inputs = document.getElementById(id).querySelectorAll('input');
        inputs.forEach(i => i.value = '');
    }
</script>
</body>
</html>
