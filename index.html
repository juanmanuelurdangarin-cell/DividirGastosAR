<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro | v5.2 Premium</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #09090b;
        --surface: #121218;
        --surface2: #1c1c26;
        --border: #2d2d3d;
        --accent: #8b5cf6; 
        --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
        --accent-soft: rgba(139, 92, 246, 0.15);
        --green: #10b981;
        --red: #f43f5e;
        --text: #f8fafc;
        --muted: #94a3b8;
        --radius: 24px;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 400px); }
    
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    header { padding: 0 24px; display: flex; justify-content: space-between; align-items: center; background: rgba(18, 18, 24, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 80px; }
    .user-box { display: flex; align-items: center; gap: 14px; }
    .user-box img { width: 44px; height: 44px; border-radius: 14px; border: 2px solid var(--accent); object-fit: cover; }
    .container { padding: 24px; max-width: 600px; margin: 0 auto; width: 100%; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; position: relative; transition: all 0.3s ease; box-shadow: var(--shadow); }

    /* Menú Flotante */
    .dropdown-menu { position: absolute; top: 60px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 18px; width: 190px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
    .dropdown-item { padding: 14px 18px; color: white; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
    .dropdown-item:active { background: var(--accent-soft); }
    .dropdown-item.danger { color: var(--red); }

    /* Input Group para móvil */
    .input-group { display: flex; gap: 10px; margin-bottom: 18px; }
    .input-group input { margin-bottom: 0; flex: 1; }
    .btn-add-inline { background: var(--accent-gradient); color: white; border: none; width: 55px; border-radius: 18px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; z-index: 1000; padding: 12px; backdrop-filter: blur(8px); }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 100%; border-radius: 32px; padding: 30px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
    
    input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 18px; border-radius: 18px; color: white; margin-bottom: 18px; font-size: 1rem; outline: none; }
    .btn-main { width: 100%; padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; background: var(--accent-gradient); color: white; font-size: 1.1rem; text-transform: uppercase; font-family: 'Outfit'; }
    
    .fab { position: fixed; bottom: 30px; right: 25px; width: 72px; height: 72px; background: var(--accent-gradient); color: white; border-radius: 22px; border: none; font-size: 32px; z-index: 90; display: flex; align-items: center; justify-content: center; transform: rotate(45deg); box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4); }
    .fab i { transform: rotate(-45deg); }

    .tabs-nav { display: flex; background: var(--surface2); padding: 6px; border-radius: 20px; margin-bottom: 24px; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { flex: 1; padding: 12px 6px; border: none; background: none; color: var(--muted); font-weight: 700; cursor: pointer; border-radius: 16px; font-size: 0.7rem; text-transform: uppercase; transition: all 0.3s; white-space: nowrap; }
    .tab-btn.active { background: var(--accent-gradient); color: white; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; justify-content:center; align-items:center;">
    <div style="width:50px; height:50px; border:4px solid var(--surface2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
</div>

<div id="screen-login" class="screen">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
        <div style="width:100px; height:100px; background:var(--accent-gradient); border-radius:30px; display:flex; align-items:center; justify-content:center; margin-bottom:30px; transform:rotate(10deg);"><i class="fa-solid fa-crown fa-3x" style="color:white; transform:rotate(-10deg);"></i></div>
        <h1 style="font-family:'Outfit'; font-size:3.5rem; font-weight:800; line-height:0.9;">Divide<br><span style="color:var(--accent)">PREMIUM</span></h1>
        <button class="btn-main" style="margin-top:50px;" onclick="login()"><i class="fa-brands fa-google"></i> Acceso Google</button>
    </div>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-box"><img id="header-img" src=""><span id="header-name" style="font-weight:800; font-family:'Outfit';">...</span></div>
        <button onclick="logout()" style="background:var(--surface2); border:none; color:var(--muted); width:40px; height:40px; border-radius:12px;"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Outfit'; margin-bottom:25px; font-size:1.8rem;">Mis Eventos</h2>
        <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModalCreate()"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="screen-detail" class="screen">
    <header>
        <button onclick="showScreen('screen-main')" style="background:var(--surface2); border:none; color:white; width:40px; height:40px; border-radius:12px;"><i class="fa-solid fa-chevron-left"></i></button>
        <h3 id="det-title" style="font-family:'Outfit'; flex:1; text-align:center; font-size:1.1rem; padding:0 10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">...</h3>
        <div style="display:flex; gap:10px;">
            <button onclick="openModal('modal-manage-participants')" style="background:none; border:none; color:var(--text); font-size:1.2rem;"><i class="fa-solid fa-user-plus"></i></button>
            <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent); font-size:1.2rem;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </header>
    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('gastos', this)">Gastos</button>
            <button class="tab-btn" onclick="switchTab('saldos', this)">Saldos</button>
            <button class="tab-btn" onclick="switchTab('transfer', this)">Cuentas</button>
            <button class="tab-btn" onclick="switchTab('historial', this)">Log</button>
        </div>
        <div id="tab-area"></div>
    </div>
    <button class="fab" id="fab-detail" onclick="openExpenseModal()"><i class="fa-solid fa-receipt"></i></button>
</div>

<div id="modal-event" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-event')">
    <div class="modal">
        <h2 id="event-modal-title" style="font-family:'Outfit'; margin-bottom:25px;">Evento</h2>
        <input type="text" id="ev-name" placeholder="Nombre del evento">
        <input type="date" id="ev-date" style="color-scheme: dark;">
        
        <p style="font-size:0.8rem; color:var(--muted); margin-bottom:12px; font-weight:700;">PARTICIPANTES</p>
        <div id="setup-parts-list" style="margin-bottom:20px; display:flex; flex-direction:column; gap:10px;"></div>
        
        <div class="input-group">
            <input type="text" id="ev-part-name" placeholder="Nombre + Botón +" onkeypress="if(event.key==='Enter')addPartToSetup()">
            <button class="btn-add-inline" onclick="addPartToSetup()"><i class="fa-solid fa-plus"></i></button>
        </div>
        
        <button class="btn-main" onclick="dbSaveEvent()">Guardar Cambios</button>
    </div>
</div>

<div id="modal-confirm" class="modal-overlay">
    <div class="modal" style="text-align:center;">
        <i class="fa-solid fa-circle-exclamation" style="font-size:3rem; color:var(--red); margin-bottom:15px;"></i>
        <h2 style="font-family:'Outfit';">¿Confirmar?</h2>
        <p id="confirm-msg" style="color:var(--muted); margin:15px 0;"></p>
        <div style="display:flex; gap:10px;">
            <button style="flex:1; padding:18px; border-radius:18px; background:var(--surface2); color:white; border:none;" onclick="closeModal('modal-confirm')">No</button>
            <button style="flex:1; padding:18px; border-radius:18px; background:var(--red); color:white; border:none; font-weight:800;" id="confirm-btn-action">Eliminar</button>
        </div>
    </div>
</div>

<div id="modal-add-expense" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-add-expense')">
    <div class="modal">
        <h2 id="expense-modal-title" style="margin-bottom:25px; font-family:'Outfit';">Gasto</h2>
        <input type="text" id="ex-desc" placeholder="¿Qué se compró?">
        <input type="number" id="ex-amount" placeholder="0.00" step="0.01">
        <p style="font-size:0.8rem; color:var(--muted); margin-bottom:10px;">Pagador</p>
        <select id="ex-payer"></select>
        <div id="ex-list-checks" style="margin-bottom:30px;"></div>
        <button class="btn-main" onclick="dbSaveExpense()">Guardar</button>
    </div>
</div>

<div id="modal-manage-participants" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-manage-participants')">
    <div class="modal">
        <h2 style="font-family:'Outfit'; margin-bottom:25px;">Integrantes</h2>
        <div id="manage-parts-list" style="margin-bottom:20px; display:flex; flex-direction:column; gap:12px;"></div>
        <input type="text" id="add-new-part-name" placeholder="Nuevo integrante..." onkeypress="if(event.key==='Enter')addNewParticipantDirect()">
        <button class="btn-main" style="background:var(--surface2); box-shadow:none; color:var(--muted);" onclick="closeModal('modal-manage-participants')">Cerrar</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });
    let currentEvent = null, activeTab = 'gastos', tempParticipants = [], editingEventId = null, editingExpenseId = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('header-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('header-img').src = user.photoURL;
            showScreen('screen-main');
            loadEvents();
        } else { showScreen('screen-login'); }
    });

    async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    function loadEvents() {
        db.collection('events').where('participantsIds', 'array-contains', auth.currentUser.uid)
        .onSnapshot(snap => {
            const list = document.getElementById('event-list');
            list.innerHTML = snap.empty ? '<p style="text-align:center; padding:40px; opacity:0.5;">Sin eventos activos.</p>' : 
            snap.docs.map(doc => {
                const d = doc.data();
                return `
                <div class="card" onclick="openEvent('${doc.id}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h4 style="font-family:'Outfit'; color:white; font-size:1.2rem;">${d.name}</h4>
                            <p style="color:var(--muted); font-size:0.8rem; margin-top:6px;"><i class="fa-regular fa-calendar-days"></i> ${d.date || 'Sin fecha'}</p>
                        </div>
                        <button onclick="event.stopPropagation(); toggleMenu('${doc.id}')" style="background:var(--surface2); border:none; color:var(--text); width:40px; height:40px; border-radius:12px;"><i class="fa-solid fa-ellipsis"></i></button>
                        <div id="menu-${doc.id}" class="dropdown-menu">
                            <button class="dropdown-item" onclick="event.stopPropagation(); handleEditAction('${doc.id}')"><i class="fa-solid fa-pen"></i> Editar Evento</button>
                            <button class="dropdown-item danger" onclick="event.stopPropagation(); confirmDeleteEvent('${doc.id}', '${d.name.replace(/'/g, "\\'")}')"><i class="fa-solid fa-trash"></i> Eliminar</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        });
    }

    function toggleMenu(id) {
        const menu = document.getElementById('menu-' + id);
        const isOpen = menu.style.display === 'flex';
        document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
        if(!isOpen) menu.style.display = 'flex';
        setTimeout(() => { window.onclick = () => document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none'); }, 50);
    }

    async function handleEditAction(id) {
        const doc = await db.collection('events').doc(id).get();
        const data = doc.data();
        editingEventId = id;
        document.getElementById('event-modal-title').innerText = "Editar Evento";
        document.getElementById('ev-name').value = data.name;
        document.getElementById('ev-date').value = data.date || "";
        tempParticipants = data.participants;
        renderSetupParts();
        openModal('modal-event');
    }

    function openModalCreate() {
        editingEventId = null;
        document.getElementById('event-modal-title').innerText = "Nuevo Evento";
        document.getElementById('ev-name').value = "";
        document.getElementById('ev-date').value = "";
        tempParticipants = [{id: auth.currentUser.uid, name: auth.currentUser.displayName}];
        renderSetupParts();
        openModal('modal-event');
    }

    function addPartToSetup() {
        const inp = document.getElementById('ev-part-name');
        if(!inp.value.trim()) return;
        tempParticipants.push({id: 't_' + Date.now(), name: inp.value.trim()});
        inp.value = '';
        renderSetupParts();
    }

    function renderSetupParts() {
        document.getElementById('setup-parts-list').innerHTML = tempParticipants.map((p, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface2); padding:15px; border-radius:18px; border:1px solid var(--border);">
                <span style="font-weight:700;">${p.name}</span>
                ${p.id !== auth.currentUser.uid ? `<i class="fa-solid fa-circle-xmark" style="color:var(--red); font-size:1.3rem;" onclick="tempParticipants.splice(${i},1);renderSetupParts()"></i>` : '<small style="color:var(--accent)">Tú</small>'}
            </div>
        `).join('');
    }

    async function dbSaveEvent() {
        const name = document.getElementById('ev-name').value;
        if(!name) return;
        const date = document.getElementById('ev-date').value;
        const payload = { name, date, participants: tempParticipants, participantsIds: tempParticipants.map(p => p.id) };
        if(editingEventId) await db.collection('events').doc(editingEventId).update(payload);
        else {
            payload.expenses = [];
            payload.logs = [{u: auth.currentUser.displayName, a: "creó el evento", d: Date.now()}];
            await db.collection('events').add(payload);
        }
        closeModal('modal-event');
    }

    function confirmDeleteEvent(id, name) {
        document.getElementById('confirm-msg').innerText = `¿Borrar el evento "${name}"?`;
        document.getElementById('confirm-btn-action').onclick = async () => {
            await db.collection('events').doc(id).delete();
            closeModal('modal-confirm');
        };
        openModal('modal-confirm');
    }

    function openEvent(id) {
        db.collection('events').doc(id).onSnapshot(doc => {
            if(!doc.exists) return;
            currentEvent = {id: doc.id, ...doc.data()};
            document.getElementById('det-title').innerText = currentEvent.name;
            renderTab();
            renderManageParticipants();
            showScreen('screen-detail');
        });
    }

    // Funciones de Gastos (Iguales a v5.0 para asegurar estabilidad)
    function openExpenseModal(expense = null) {
        editingExpenseId = expense ? expense.id : null;
        document.getElementById('ex-desc').value = expense ? expense.desc : "";
        document.getElementById('ex-amount').value = expense ? expense.amount : "";
        document.getElementById('ex-payer').innerHTML = currentEvent.participants.map(p => `<option value="${p.id}" ${expense && expense.payerId === p.id ? 'selected' : ''}>${p.name}</option>`).join('');
        document.getElementById('ex-list-checks').innerHTML = currentEvent.participants.map(p => `
            <div style="display:flex; justify-content:space-between; padding:15px; background:var(--surface2); border-radius:15px; margin-bottom:8px;">
                <span>${p.name}</span>
                <input type="checkbox" value="${p.id}" class="ex-check" ${!expense || expense.includedIds.includes(p.id) ? 'checked' : ''}>
            </div>`).join('');
        openModal('modal-add-expense');
    }

    async function dbSaveExpense() {
        const desc = document.getElementById('ex-desc').value, amount = parseFloat(document.getElementById('ex-amount').value);
        const included = Array.from(document.querySelectorAll('.ex-check:checked')).map(c => c.value);
        const payerId = document.getElementById('ex-payer').value;
        let newExpenses = [...currentEvent.expenses];
        const expData = { id: editingExpenseId || Date.now(), desc, amount, payerId, includedIds: included, payerName: currentEvent.participants.find(p=>p.id===payerId).name, d: Date.now() };
        if(editingExpenseId) newExpenses = newExpenses.map(e => e.id === editingExpenseId ? expData : e);
        else newExpenses.push(expData);
        await db.collection('events').doc(currentEvent.id).update({ expenses: newExpenses });
        closeModal('modal-add-expense');
    }

    function renderTab() {
        const area = document.getElementById('tab-area');
        if(activeTab === 'gastos') {
            area.innerHTML = currentEvent.expenses.map(e => `
                <div class="card" onclick='openExpenseModal(${JSON.stringify(e)})'>
                    <div style="display:flex; justify-content:space-between;">
                        <span><b>${e.desc}</b><br><small>Pagó ${e.payerName}</small></span>
                        <b style="color:var(--accent)">${fmt.format(e.amount)}</b>
                    </div>
                </div>`).reverse().join('');
        } else if(activeTab === 'saldos') {
            const bal = calculateBalances();
            area.innerHTML = currentEvent.participants.map(p => `<div class="card"><span>${p.name}</span> <b style="float:right; color:${bal[p.id]>=0?'var(--green)':'var(--red)'}">${fmt.format(bal[p.id])}</b></div>`).join('');
        }
    }

    function calculateBalances() {
        let b = {}; currentEvent.participants.forEach(p => b[p.id] = 0);
        currentEvent.expenses.forEach(e => {
            b[e.payerId] += e.amount;
            let s = e.amount / e.includedIds.length;
            e.includedIds.forEach(id => { if(b.hasOwnProperty(id)) b[id] -= s; });
        });
        return b;
    }

    function renderManageParticipants() {
        document.getElementById('manage-parts-list').innerHTML = currentEvent.participants.map(p => `
            <div style="display:flex; justify-content:space-between; background:var(--surface2); padding:15px; border-radius:15px;">
                <span>${p.name}</span>
            </div>`).join('');
    }

    function switchTab(t, b) { activeTab = t; document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); renderTab(); }
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function shareEvent() { const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id; if(navigator.share) navigator.share({title: currentEvent.name, url}); else prompt("Link:", url); }
    @keyframes spin { to { transform: rotate(360deg); } }
</script>
</body>
</html>
