<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
        --accent: #6c63ff; --accent2: #ff6584; --green: #1de9b6; --red: #ff6584;
        --text: #e8eaf0; --muted: #7a7f99; --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 70px; }
    .user-box { display: flex; align-items: center; gap: 12px; }
    .user-box img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); background: var(--surface2); }

    .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }

    .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; cursor: pointer; border-left: 5px solid var(--accent); }

    .btn-main { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: white; font-size: 1rem; }

    /* PANTALLA LOGIN */
    #screen-login { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
    #screen-login.active { display: flex; }

    #screen-loading { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .loader { width: 45px; height: 45px; border: 4px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading"><div class="loader"></div></div>

<div id="screen-login" class="screen">
    <i class="fa-solid fa-wallet fa-4x" style="color:var(--accent); margin-bottom:20px;"></i>
    <h1 style="font-family:'Syne'; margin-bottom:10px;">DivideGastos Pro</h1>
    <p style="color:var(--muted); margin-bottom:40px;">Gestioná tus gastos grupales de forma simple y rápida.</p>
    <button class="btn-main" onclick="login()"><i class="fa-brands fa-google" style="margin-right:10px;"></i> Ingresar con Google</button>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-box">
            <img id="header-img" src="">
            <span id="header-user">...</span>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size: 1.3rem;"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Syne'; margin-bottom:25px;">Mis Eventos</h2>
        <div id="main-event-list"></div>
    </div>
    <button class="fab" style="position:fixed; bottom:30px; right:25px; width:65px; height:65px; background:var(--accent); color:white; border-radius:50%; border:none; font-size:26px; display:flex; align-items:center; justify-content:center;" onclick="document.getElementById('modal-new-event').classList.add('active')">
        <i class="fa-solid fa-plus"></i>
    </button>
</div>

<script>
    // Tu Configuración (No la toques)
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Función para mostrar pantallas sin errores
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-loading').style.display = 'none';
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
    }

    // LISTENER DE AUTH (Acá estaba el error)
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('header-user').innerText = user.displayName;
            document.getElementById('header-img').src = user.photoURL;
            showScreen('screen-main');
            loadEvents();
        } else {
            showScreen('screen-login');
        }
    });

    async function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            await auth.signInWithPopup(provider);
        } catch(e) {
            alert("Error al ingresar. Asegurate de permitir las ventanas emergentes.");
        }
    }

    function logout() {
        auth.signOut().then(() => {
            window.location.href = window.location.origin + window.location.pathname;
        });
    }

    // El resto de tus funciones de Firebase (loadEvents, createEvent, etc) irían acá...
    // Pero primero probá si con esto lográs entrar.
</script>

</body>
</html>
