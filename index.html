<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivideGastos Debug Mode</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root { --primary: #6c63ff; --accent: #ff6584; --bg: #f0f2f8; --text: #2d3142; }
  body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
  .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
  .screen.active { display: flex; }
  
  /* Consola de errores en pantalla */
  #debug-console { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: #1a1a1a; color: #00ff00; font-family: monospace; 
    font-size: 12px; padding: 10px; max-height: 150px; overflow-y: auto; z-index: 9999;
    border-top: 2px solid var(--accent);
  }

  .btn-google { 
    padding: 15px 25px; background: white; border: 2px solid #ddd; 
    border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
  }
  .app-header { background: white; width: 100%; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; position: fixed; top: 0; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

  <div id="debug-console">Iniciando sistema de diagnóstico...</div>

  <div id="screen-loading" class="screen active">
    <i class="fa-solid fa-sync fa-spin fa-3x" style="color:var(--primary)"></i>
    <p style="margin-top:20px">Verificando sesión...</p>
  </div>

  <div id="screen-onboarding" class="screen">
    <h1 style="margin-bottom:20px">DivideGastos</h1>
    <button class="btn-google" onclick="login()">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
      Entrar con Google
    </button>
  </div>

  <div id="screen-main" class="screen">
    <header class="app-header">
      <span id="user-name">Usuario</span>
      <button onclick="logout()">Salir</button>
    </header>
    <h2>¡Logueado con éxito!</h2>
    <p>Si ves esto, el problema está resuelto.</p>
  </div>

  <script>
    const debug = (msg, isError = false) => {
      const consoleEl = document.getElementById('debug-console');
      const time = new Date().toLocaleTimeString();
      consoleEl.innerHTML += `<div style="color:${isError?'#ff6b6b':'#00ff00'}">[${time}] ${msg}</div>`;
      consoleEl.scrollTop = consoleEl.scrollHeight;
      console.log(msg);
    };

    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    function init() {
      try {
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        debug("Firebase Inicializado.");

        // CAPTURAR RESULTADO DE REDIRECCIÓN
        auth.getRedirectResult()
          .then((result) => {
            if (result.user) {
              debug("Redirect exitoso: " + result.user.displayName);
            } else {
              debug("No hay resultado de redirect pendiente.");
            }
          })
          .catch((error) => {
            debug("ERROR EN REDIRECT: " + error.code + " - " + error.message, true);
            // Si el error es 'auth/internal-error', es un problema de comunicación con Google.
            alert("Error crítico: " + error.message);
          });

        // OBSERVAR ESTADO
        auth.onAuthStateChanged((user) => {
          if (user) {
            debug("Sesión activa detectada: " + user.email);
            document.getElementById('user-name').innerText = user.displayName;
            showScreen('main');
          } else {
            debug("No hay sesión. Mostrando login.");
            showScreen('onboarding');
          }
        });

      } catch (e) {
        debug("ERROR INICIAL: " + e.message, true);
      }
    }

    function login() {
      debug("Iniciando flujo de login...");
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithRedirect(provider);
    }

    function logout() {
      firebase.auth().signOut().then(() => window.location.reload());
    }

    window.onload = init;
  </script>
</body>
</html>
