<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
    --accent: #6c63ff; --accent2: #ff6584; --green: #1de9b6; --red: #ff6584;
    --text: #e8eaf0; --muted: #7a7f99; --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  /* --- ESTRUCTURA --- */
  .screen { display: none; min-height: 100vh; flex-direction: column; animation: fadeIn 0.3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

  /* --- HEADER --- */
  header { 
    padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
    position: sticky; top: 0; background: rgba(13,15,20,0.9); backdrop-filter: blur(12px); 
    z-index: 100; border-bottom: 1px solid var(--border);
  }
  .user-info { display: flex; align-items: center; gap: 10px; background: var(--surface); padding: 5px 12px 5px 5px; border-radius: 30px; border: 1px solid var(--border); }
  .user-info img { width: 28px; height: 28px; border-radius: 50%; }

  /* --- LISTADO EVENTOS --- */
  .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; flex: 1; }
  .event-card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); 
    padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; position: relative;
    overflow: hidden;
  }
  .event-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
  .event-card.shared::before { background: var(--accent2); }
  .event-card:active { transform: scale(0.98); background: var(--surface2); }
  .event-owner { font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; }

  /* --- TABS --- */
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: var(--surface); padding: 5px; border-radius: 12px; }
  .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--muted); transition: 0.2s; }
  .tab.active { background: var(--accent); color: white; }

  /* --- MODALES --- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; z-index: 1000; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 20px; max-height: 90vh; overflow-y: auto; }
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; font-size: 1rem; }

  /* BOTONES */
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 8px 24px rgba(108,99,255,0.4); z-index: 90; display: flex; align-items: center; justify-content: center; }

  /* HISTORIAL LOG */
  .log-item { font-size: 0.85rem; padding: 10px 0; border-bottom: 1px solid var(--border); color: var(--muted); }
  .log-item b { color: var(--text); }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="screen-loading" class="screen active">
    <div style="margin: auto; text-align: center;">
      <div class="spinner" style="width:50px; height:50px; border:4px solid var(--surface2); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
    </div>
  </div>

  <div id="screen-onboarding" class="screen">
    <div style="margin: auto; width: 90%; max-width: 400px; text-align: center; padding: 40px; background: var(--surface); border-radius: 24px;">
      <i class="fa-solid fa-receipt fa-4x" style="color: var(--accent); margin-bottom: 20px;"></i>
      <h1 style="font-family:'Syne'; font-size: 2.2rem; margin-bottom: 10px;">DivideGastos</h1>
      <p style="color: var(--muted); margin-bottom: 30px;">Cuentas claras en tiempo real.</p>
      <button class="btn btn-primary" onclick="login()" style="background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20"> Continuar con Google
      </button>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <header>
      <div class="user-info">
        <img id="user-photo" src="">
        <span id="user-name">Usuario</span>
      </div>
      <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size: 1.2rem;"><i class="fa-solid fa-sign-out-alt"></i></button>
    </header>

    <div class="container">
      <h2 style="font-family:'Syne'; margin-bottom: 20px;">Mis Eventos</h2>
      <div id="event-list">
        </div>
    </div>
    <button class="fab" onclick="openModal('modal-new-event')"><i class="fa-solid fa-plus"></i></button>
  </div>

  <div id="screen-detail" class="screen">
    <header>
      <button onclick="showScreen('main')" style="background:none; border:none; color:white;"><i class="fa-solid fa-arrow-left"></i></button>
      <h3 id="detail-title" style="font-family:'Syne';">Evento</h3>
      <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent);"><i class="fa-solid fa-user-plus"></i></button>
    </header>

    <div class="container">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('gastos')">Gastos</div>
        <div class="tab" onclick="switchTab('saldos')">Saldos</div>
        <div class="tab" onclick="switchTab('historial')">Historial</div>
      </div>

      <div id="tab-content">
        </div>
    </div>
    <button class="fab" id="fab-add-expense" onclick="openModal('modal-add-expense')"><i class="fa-solid fa-cart-plus"></i></button>
  </div>

  <div id="modal-new-event" class="modal-overlay">
    <div class="modal">
      <h2>Nuevo Evento</h2>
      <label>Nombre del evento</label>
      <input type="text" id="ev-name" placeholder="Ej: Viaje Bariloche">
      <label>Moneda</label>
      <select id="ev-currency">
        <option value="ARS">Peso Argentino (ARS)</option>
        <option value="USD">Dólar (USD)</option>
        <option value="EUR">Euro (EUR)</option>
      </select>
      <button class="btn btn-primary" onclick="dbCreateEvent()">Crear y Compartir</button>
      <button class="btn btn-outline" onclick="closeModal('modal-new-event')" style="margin-top:10px">Cancelar</button>
    </div>
  </div>

  <script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentEvent = null;
    let unsubscribeEvents = null;

    // --- AUTENTICACIÓN ---
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
        document.getElementById('user-photo').src = user.photoURL;
        
        // Manejar Link de Invitación
        const params = new URLSearchParams(window.location.search);
        if (params.has('join')) {
          joinEvent(params.get('join'));
        } else {
          showScreen('main');
          listenToEvents();
        }
      } else {
        showScreen('onboarding');
      }
    });

    async function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    }

    function logout() { auth.signOut(); window.location.href = window.location.pathname; }

    // --- LÓGICA FIRESTORE ---
    function listenToEvents() {
      if (unsubscribeEvents) unsubscribeEvents();
      // Escucha eventos donde el usuario es participante
      unsubscribeEvents = db.collection('events')
        .where('participantsIds', 'array-contains', currentUser.uid)
        .onSnapshot(snapshot => {
          const events = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
          renderEventList(events);
        });
    }

    async function dbCreateEvent() {
      const name = document.getElementById('ev-name').value;
      const currency = document.getElementById('ev-currency').value;
      if (!name) return;

      const newEvent = {
        name: name,
        currency: currency,
        ownerId: currentUser.uid,
        ownerName: currentUser.displayName,
        participantsIds: [currentUser.uid],
        participants: [{id: currentUser.uid, name: currentUser.displayName, photo: currentUser.photoURL}],
        expenses: [],
        logs: [{user: currentUser.displayName, action: "creó el evento", date: Date.now()}]
      };

      const doc = await db.collection('events').add(newEvent);
      closeModal('modal-new-event');
      openEventDetail(doc.id);
    }

    async function joinEvent(id) {
      const docRef = db.collection('events').doc(id);
      const doc = await docRef.get();
      if (doc.exists) {
        const data = doc.data();
        if (!data.participantsIds.includes(currentUser.uid)) {
          await docRef.update({
            participantsIds: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
            participants: firebase.firestore.FieldValue.arrayUnion({
              id: currentUser.uid, name: currentUser.displayName, photo: currentUser.photoURL
            }),
            logs: firebase.firestore.FieldValue.arrayUnion({
              user: currentUser.displayName, action: "se unió al evento", date: Date.now()
            })
          });
        }
        window.history.replaceState({}, document.title, window.location.pathname);
        openEventDetail(id);
      }
    }

    // --- RENDERIZADO ---
    function renderEventList(events) {
      const container = document.getElementById('event-list');
      if (events.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted);">No tienes eventos. ¡Crea uno nuevo!</div>`;
        return;
      }
      container.innerHTML = events.map(ev => `
        <div class="event-card ${ev.ownerId !== currentUser.uid ? 'shared' : ''}" onclick="openEventDetail('${ev.id}')">
          <div class="event-owner">${ev.ownerId === currentUser.uid ? 'Eres el dueño' : 'Creado por ' + ev.ownerName}</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="event-name">${ev.name}</div>
            <div style="font-weight:bold; color:var(--accent);">${ev.currency}</div>
          </div>
        </div>
      `).join('');
    }

    async function openEventDetail(id) {
      db.collection('events').doc(id).onSnapshot(doc => {
        if (!doc.exists) return;
        currentEvent = {id: doc.id, ...doc.data()};
        document.getElementById('detail-title').innerText = currentEvent.name;
        showScreen('detail');
        switchTab('gastos');
      });
    }

    function switchTab(type) {
      const content = document.getElementById('tab-content');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target?.classList?.add('active');

      if (type === 'gastos') {
        content.innerHTML = currentEvent.expenses.length === 0 ? '<p style="color:var(--muted); text-align:center; margin-top:20px;">No hay gastos cargados.</p>' : 'Lista de gastos...';
      } else if (type === 'historial') {
        content.innerHTML = currentEvent.logs.reverse().map(log => `
          <div class="log-item">
            ${new Date(log.date).toLocaleDateString()} ${new Date(log.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} - 
            <b>${log.user}</b> ${log.action}
          </div>
        `).join('');
      }
    }

    function shareEvent() {
      const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id;
      if (navigator.share) {
        navigator.share({ title: 'Únete a mi evento en DivideGastos', url: url });
      } else {
        prompt("Copia este link para invitar amigos:", url);
      }
    }

    // --- UTILIDADES ---
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    @keyframes spin { to { transform: rotate(360deg); } }
  </script>
</body>
</html>
