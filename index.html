<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary: #6c63ff;
    --primary-dark: #5a52d5;
    --primary-light: #ede9ff;
    --accent: #ff6584;
    --success: #43c59e;
    --danger: #ff6b6b;
    --warning: #ffd166;
    --bg: #f0f2f8;
    --card: #ffffff;
    --text: #2d3142;
    --text-muted: #9094a8;
    --border: #e2e5f0;
    --pedidosya: #ff0045;
    --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 18px;
    --radius-sm: 10px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn .3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ══ LOADING ══ */
  #screen-loading { background: linear-gradient(145deg,#6c63ff,#a78bfa,#ff6584); justify-content: center; align-items: center; }
  .loading-logo { text-align: center; color: #fff; }
  .loading-logo i { font-size: 3.5rem; margin-bottom: 16px; display: block; animation: pulse 1.5s ease infinite; }
  .loading-logo h1 { font-size: 1.8rem; font-weight: 800; }
  .loading-logo p { opacity: .8; margin-top: 8px; font-size: .9rem; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 24px auto 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  /* ══ ONBOARDING ══ */
  #screen-onboarding { background: linear-gradient(145deg,#6c63ff,#a78bfa,#ff6584); justify-content: center; align-items: center; padding: 28px 24px; }
  .onboarding-card { background: rgba(255,255,255,0.97); border-radius: 28px; padding: 36px 28px 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
  .onboarding-logo { text-align: center; margin-bottom: 8px; }
  .onboarding-logo i { font-size: 2.8rem; color: var(--primary); }
  .onboarding-title { text-align: center; font-size: 1.7rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .onboarding-title span { color: var(--primary); }
  .onboarding-subtitle { text-align: center; color: var(--text-muted); font-size: .93rem; margin-bottom: 28px; min-height: 40px; }
  .btn-google { width: 100%; padding: 14px; background: #fff; color: var(--text); border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all var(--transition); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn-google:hover { border-color: #4285f4; box-shadow: 0 4px 16px rgba(66,133,244,0.2); }
  .btn-google:active { transform: scale(0.97); }
  .btn-google img { width: 22px; height: 22px; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>
<body>

  <div id="screen-loading" class="screen active">
    <div class="loading-logo">
      <i class="fa-solid fa-receipt"></i>
      <h1>DivideGastos Pro</h1>
      <p>Procesando...</p>
      <div class="spinner"></div>
    </div>
  </div>

  <div id="screen-onboarding" class="screen">
    <div class="onboarding-card">
      <div class="onboarding-logo"><i class="fa-solid fa-receipt"></i></div>
      <h1 class="onboarding-title">DivideGastos <span>Pro</span></h1>
      <p class="onboarding-subtitle">Gestioná cuentas claras y transparentes con tus grupos.</p>
      
      <button class="btn-google" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
        Continuar con Google
      </button>
    </div>
  </div>

  <script>
    // Credenciales integradas del proyecto
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65",
      measurementId: "G-ZJ1HMDPKFZ"
    };

    const state = {
      user: null,
      history: []
    };
    
    let db = null;
    let auth = null;

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const target = document.getElementById(`screen-${screenId}`);
      if (target) target.classList.add('active');
    }

    function showToast(message) {
      console.log("Toast:", message);
    }

    // ══════════════════════════════════════════════════════════
    //  FIREBASE & AUTH
    // ══════════════════════════════════════════════════════════
    
    function initFirebase(config) {
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(config);
        }
        db = firebase.firestore();
        auth = firebase.auth();
        
        // Manejar el resultado de la redirección al volver de Google
        auth.getRedirectResult().then((result) => {
          if (result.user) {
            state.user = result.user;
            showToast(`¡Bienvenido ${result.user.displayName || 'Usuario'}!`);
            loadEventsFromCloud();
          }
        }).catch((error) => {
          console.error("Error al volver de la redirección:", error);
          showToast("Hubo un error al autenticar con Google.");
          showScreen("onboarding");
        });

        // Escuchar cambios de estado
        auth.onAuthStateChanged(user => {
          if (user) {
            state.user = user;
            loadEventsFromCloud();
          } else {
            state.user = null;
            showScreen("onboarding");
          }
        });
        return true;
      } catch(e) {
        console.error("Error al inicializar Firebase:", e);
        showScreen("onboarding");
        return false;
      }
    }

    async function signInWithGoogle() {
      if (!auth) {
        showToast("Error de inicialización de Auth");
        return;
      }
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        showScreen("loading");
        await auth.signInWithRedirect(provider);
      } catch (error) {
        console.error("Error en login:", error);
        showToast("Error al iniciar sesión");
        showScreen("onboarding");
      }
    }

    async function loadEventsFromCloud() {
      if (!state.user || !db) return;
      try {
        showScreen("loading");
        const snapshot = await db.collection("events")
          .where("userId", "==", state.user.uid)
          .get();
        
        state.history = snapshot.docs.map(doc => doc.data());
        console.log("Datos cargados:", state.history);
        
        // Aquí te quedarás en pantalla de carga porque no hay nada más maquetado todavía.
      } catch (e) {
        console.error("Error cargando datos:", e);
        showToast("Error al cargar los datos");
      }
    }

    // ══════════════════════════════════════════════════════════
    //  BOOT (ARRANQUE AUTOMÁTICO)
    // ══════════════════════════════════════════════════════════
    (function boot() {
      initFirebase(firebaseConfig);
    })();
  </script>
</body>
</html>
