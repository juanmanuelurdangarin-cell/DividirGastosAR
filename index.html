<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DivideGastos Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <section id="welcome-screen" class="screen hidden">
            <div class="welcome-container">
                <div class="brand-logo">
                    <i class="fas fa-receipt"></i>
                </div>
                <h1 id="welcome-title">Bienvenido</h1>
                <p class="subtitle">Configurá tu región para empezar</p>
                
                <div class="form-group">
                    <label><i class="fas fa-language"></i> Idioma / Language</label>
                    <select id="main-lang-selector" class="custom-select" onchange="onLanguageChange(this.value)">
                        <option value="">Seleccionar...</option>
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="pt">Português</option>
                    </select>
                </div>

                <div id="country-wrapper" class="form-group hidden">
                    <label><i class="fas fa-map-marker-alt"></i> País / Country</label>
                    <select id="main-country-selector" class="custom-select"></select>
                    <button class="btn-primary-lg" onclick="confirmIdentity()">
                        Continuar <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </section>

        <header id="main-header" class="main-header hidden">
            <div class="header-top">
                <button class="nav-icon" onclick="showHistory()"><i class="fas fa-chevron-left"></i></button>
                <div class="header-center">
                    <h2 id="event-title-display">DivideGastos</h2>
                    <span id="version-tag">v1.0</span>
                </div>
                <button class="nav-icon" onclick="shareEventLink()"><i class="fas fa-share-alt"></i></button>
            </div>
            <div class="currency-pill" id="currency-display">ARS</div>
        </header>

        <main id="content-area" class="hidden">
            <section id="history-screen" class="page hidden">
                <div class="section-header">
                    <h3 data-i18n="history_title">Tus Eventos</h3>
                </div>
                <div id="history-list" class="event-grid"></div>
                <button class="btn-fab-text" onclick="createNewEvent()">
                    <i class="fas fa-plus"></i> <span data-i18n="btn_new_event">Nuevo Evento</span>
                </button>
            </section>

            <section id="setup-screen" class="page hidden">
                <div class="card setup-card">
                    <h3 data-i18n="setup_title">Nuevo Evento</h3>
                    <input type="text" id="event-title" class="modern-input" data-i18n-placeholder="placeholder_title">
                    
                    <div class="input-row">
                        <select id="event-currency" class="modern-select"></select>
                    </div>

                    <div class="friend-input-zone">
                        <input type="text" id="friend-name" class="modern-input" data-i18n-placeholder="placeholder_name">
                        <button class="btn-add-friend" onclick="addFriend()"><i class="fas fa-user-plus"></i></button>
                    </div>
                    <div id="friends-chips" class="chips-container"></div>
                    
                    <button class="btn-primary-lg" onclick="startEvent()" data-i18n="btn_save_continue">Crear ahora</button>
                </div>
            </section>

            <section id="main-screen" class="page hidden">
                <nav class="tab-bar">
                    <button class="tab-item active" onclick="showTab('gastos')" data-i18n="tab_expenses">Gastos</button>
                    <button class="tab-item" onclick="showTab('saldos')" data-i18n="tab_balances">Saldos</button>
                    <button class="tab-item" onclick="showTab('deudas')" data-i18n="tab_payments">Pagos</button>
                </nav>

                <div id="tab-gastos" class="tab-pane active">
                    <div id="expenses-list"></div>
                    <button class="fab-main" onclick="openExpenseModal()"><i class="fas fa-plus"></i></button>
                </div>
                <div id="tab-saldos" class="tab-pane hidden">
                    <div id="balances-list" class="card"></div>
                </div>
                <div id="tab-deudas" class="tab-pane hidden">
                    <div id="settlements-list"></div>
                </div>
            </section>
        </main>

        <footer id="ads-container" class="ad-footer hidden">
            <div class="ad-tag">Promocionado</div>
            <a href="https://www.pedidosya.com.ar" target="_blank" class="ad-link">
                <div class="ad-info">
                    <img src="https://img.icons8.com/color/48/motorcycle.png" alt="peya">
                    <p id="ad-text">¿Hambre? Pedí en <b>PedidosYa</b></p>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
        </footer>

        <div id="expense-modal" class="modal hidden">
            <div class="modal-sheet">
                <div class="modal-handle"></div>
                <h3 data-i18n="modal_title">Agregar Gasto</h3>
                <input type="text" id="exp-title" class="modern-input" data-i18n-placeholder="placeholder_expense">
                <input type="number" id="exp-amount" class="modern-input" data-i18n-placeholder="placeholder_amount" inputmode="decimal">
                
                <label class="modal-label" data-i18n="label_payer">¿Quién pagó?</label>
                <select id="exp-payer" class="modern-select"></select>

                <label class="modal-label" data-i18n="label_participants">¿Quiénes dividen?</label>
                <div id="exp-participants" class="participants-grid"></div>

                <div class="modal-footer">
                    <button class="btn-text" onclick="closeExpenseModal()" data-i18n="btn_cancel">Cancelar</button>
                    <button class="btn-primary" onclick="saveExpense()" data-i18n="btn_save">Guardar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
