<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DivideGastos Pro | v5.8 Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #09090b; --surface: #121218; --surface2: #1c1c26; --border: #2d2d3d;
            --accent: #8b5cf6; --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            --accent-soft: rgba(139, 92, 246, 0.15);
            --green: #10b981; --red: #f43f5e;
            --text: #f8fafc; --muted: #94a3b8; --radius: 24px; --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text); 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 400px);
        }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        header { 
            padding: 0 24px;
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(18, 18, 24, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; height: 80px; 
        }
        .user-box { display: flex; align-items: center; gap: 14px; }
        .user-box img { width: 44px; height: 44px; border-radius: 14px; border: 2px solid var(--accent); object-fit: cover; }
        .container { padding: 24px; max-width: 600px; margin: 0 auto; width: 100%; }
        .card { 
            background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius); 
            padding: 20px; margin-bottom: 16px; position: relative; transition: all 0.3s ease; box-shadow: var(--shadow);
        }
        .dropdown-menu { 
            position: absolute;
            top: 60px; right: 20px; background: var(--surface2); border: 1px solid var(--border); 
            border-radius: 18px; width: 200px; display: none; flex-direction: column; z-index: 1000;
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); animation: menuFade 0.2s ease;
        }
        .dropdown-item { 
            padding: 16px;
            color: white; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; 
            font-weight: 600; cursor: pointer; border: none; background: none; width: 100%;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .dropdown-item.danger { color: var(--red); }
        .modal-overlay { 
            position: fixed;
            inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; 
            z-index: 2000; padding: 12px; backdrop-filter: blur(8px);
        }
        .modal-overlay.active { display: flex; }
        .modal { 
            background: var(--surface);
            width: 100%; border-radius: 32px; padding: 30px; max-height: 90vh; 
            overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        input, select { 
            width: 100%;
            background: var(--surface2); border: 1px solid var(--border); padding: 18px; 
            border-radius: 18px; color: white; margin-bottom: 18px; font-size: 1rem; outline: none;
        }
        .btn-main { 
            width: 100%;
            padding: 20px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer; 
            background: var(--accent-gradient); color: white; font-size: 1.1rem; text-transform: uppercase; font-family: 'Outfit';
        }
        .tabs-nav { display: flex; background: var(--surface2); padding: 6px; border-radius: 20px; margin-bottom: 24px; gap: 6px; }
        .tab-btn { 
            flex: 1;
            padding: 12px 10px; border: none; background: none; color: var(--muted); font-weight: 700; 
            cursor: pointer; border-radius: 16px; font-size: 0.75rem; text-transform: uppercase;
        }
        .tab-btn.active { background: var(--accent-gradient); color: white; }
        .fab { 
            position: fixed;
            bottom: 30px; right: 25px; width: 72px; height: 72px; background: var(--accent-gradient);
            color: white; border-radius: 22px; border: none; font-size: 32px; z-index: 100;
            display: flex; align-items: center; justify-content: center; transform: rotate(45deg); box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4);
        }
        .fab i { transform: rotate(-45deg); }
        .loader { width: 50px; height: 50px; border: 4px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .balance-detail {
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); display: none;
        }
        .balance-detail.active { display: block; animation: fadeIn 0.3s ease; }
        .detail-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 8px; color: var(--muted); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="screen-loading" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div class="loader"></div>
    </div>

    <div id="screen-login" class="screen">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
            <div style="width:100px; height:100px; background:var(--accent-gradient); border-radius:30px; display:flex; align-items:center; justify-content:center; margin-bottom:30px; transform:rotate(10deg);">
                <i class="fa-solid fa-crown fa-3x" style="color:white; transform:rotate(-10deg);"></i>
            </div>
            <h1 style="font-family:'Outfit'; font-size:3.5rem; font-weight:800; line-height:0.9; letter-spacing:-2px;">Divide<br><span style="color:var(--accent)">PREMIUM</span></h1>
            <button class="btn-main" style="margin-top:50px;" onclick="login()">
                <i class="fa-brands fa-google" style="margin-right:10px;"></i> Ingresar con Google
            </button>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <header>
            <div class="user-box">
                <img id="header-img" src="">
                <span id="header-name" style="font-weight:800; font-family:'Outfit'; font-size:1.1rem;">...</span>
            </div>
            <button onclick="logout()" style="background:var(--surface2); border:none; color:var(--muted); width:40px; height:40px; border-radius:12px;"><i class="fa-solid fa-power-off"></i></button>
        </header>
        <div class="container">
            <h2 style="font-family:'Outfit'; margin-bottom:25px; font-size:1.8rem;">Mis Eventos</h2>
            <div id="event-list"></div>
        </div>
        <button class="fab" onclick="openModalCreate()"><i class="fa-solid fa-plus"></i></button>
    </div>

    <div id="screen-detail" class="screen">
        <header>
            <button onclick="showScreen('screen-main')" style="background:var(--surface2); border:none; color:white; width:40px; height:40px; border-radius:12px;"><i class="fa-solid fa-chevron-left"></i></button>
            <h3 id="det-title" style="font-family:'Outfit'; flex:1; text-align:center; font-size:1.1rem; padding:0 15px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">...</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="openModalParticipants()" style="background:none; border:none; color:var(--text); font-size:1.2rem;"><i class="fa-solid fa-user-plus"></i></button>
                <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent); font-size:1.2rem;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </header>
        <div class="container">
            <div class="tabs-nav">
                <button class="tab-btn active" onclick="switchTab('gastos', this)">Gastos</button>
                <button class="tab-btn" onclick="switchTab('saldos', this)">Saldos</button>
                <button class="tab-btn" onclick="switchTab('transfer', this)">Cuentas</button>
                <button class="tab-btn" onclick="switchTab('historial', this)">Log</button>
            </div>
            <div id="tab-area"></div>
        </div>
        <button class="fab" id="fab-detail" onclick="openExpenseModal()"><i class="fa-solid fa-receipt"></i></button>
    </div>

    <div id="modal-event" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-event')">
        <div class="modal">
            <h2 id="event-modal-title" style="font-family:'Outfit'; margin-bottom:25px; font-size:1.8rem;">Nuevo Evento</h2>
            <input type="text" id="ev-name" placeholder="Ej: Asado del Viernes">
            <input type="date" id="ev-date" style="color-scheme: dark;">
            <label style="font-size:0.75rem; color:var(--muted); font-weight:800;">PARTICIPANTES INICIALES</label>
            <div id="setup-parts-list" style="margin-top:10px; margin-bottom:20px; display:flex; flex-direction:column; gap:10px;"></div>
            <div class="input-group" style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="ev-part-name" placeholder="Nombre..." style="margin-bottom:0; flex:1;" onkeypress="if(event.key==='Enter')addPartToSetup()">
                <button style="background:var(--accent-gradient); color:white; border:none; width:60px; height:58px; border-radius:18px;" onclick="addPartToSetup()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <button class="btn-main" onclick="dbSaveEvent()">Guardar Evento</button>
        </div>
    </div>

    <div id="modal-add-expense" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-add-expense')">
        <div class="modal">
            <h2 id="expense-modal-title" style="margin-bottom:25px; font-family:'Outfit';">Registrar Gasto</h2>
            <input type="text" id="ex-desc" placeholder="¿Qué se compró?">
            <input type="number" id="ex-amount" placeholder="Monto total ($)" step="0.01">
            <label style="font-size:0.75rem; color:var(--muted); font-weight:800;">¿QUIÉN PAGÓ?</label>
            <select id="ex-payer" style="margin-top:10px;"></select>
            <label style="font-size:0.75rem; color:var(--muted); font-weight:800;">¿PARA QUIÉNES?</label>
            <div id="ex-list-checks" style="margin-top:10px; margin-bottom:30px;"></div>
            <button class="btn-main" onclick="dbSaveExpense()">Guardar Gasto</button>
            <button id="btn-delete-expense" class="btn-main" style="margin-top:12px; background:var(--surface2); color:var(--red); display:none;" onclick="confirmDeleteExpense(editingExpenseId)">Eliminar Gasto</button>
        </div>
    </div>

    <div id="modal-manage-participants" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-manage-participants')">
        <div class="modal">
            <h2 style="font-family:'Outfit'; margin-bottom:25px;">Integrantes</h2>
            <div id="manage-parts-list" style="margin-bottom:25px; display:flex; flex-direction:column; gap:12px;"></div>
            <div class="input-group" style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="add-new-part-name" placeholder="Nuevo amigo..." style="margin-bottom:0; flex:1;" onkeypress="if(event.key==='Enter')addNewParticipantDirect()">
                <button style="background:var(--accent-gradient); color:white; border:none; width:60px; height:58px; border-radius:18px;" onclick="addNewParticipantDirect()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <button class="btn-main" style="background:var(--surface2); color:var(--muted);" onclick="closeModal('modal-manage-participants')">Cerrar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
            authDomain: "dividirgastosar.firebaseapp.com",
            projectId: "dividirgastosar",
            storageBucket: "dividirgastosar.firebasestorage.app",
            messagingSenderId: "1073347556736",
            appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });
        let currentEvent = null, activeTab = 'gastos', tempParticipants = [], editingEventId = null, editingExpenseId = null;

        async function login() { 
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider); 
        }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('header-name').innerText = user.displayName.split(' ')[0];
                document.getElementById('header-img').src = user.photoURL;
                
                // Procesar link de invitación
                const urlParams = new URLSearchParams(window.location.search);
                const joinId = urlParams.get('join');
                if (joinId) {
                    await db.collection('user_events').doc(`${user.uid}_${joinId}`).set({
                        userId: user.uid, eventId: joinId, lastAccess: Date.now()
                    });
                    window.history.replaceState({}, document.title, window.location.pathname);
                    openEvent(joinId);
                }
                showScreen('screen-main');
                loadEvents();
            } else { showScreen('screen-login'); }
        });

        async function loadEvents() {
            const userId = auth.currentUser.uid;
            const list = document.getElementById('event-list');
            
            // ESCUCHA DOBLE: Eventos donde soy participante + Eventos guardados por link
            db.collection('events').where('participantsIds', 'array-contains', userId)
            .onSnapshot(snap1 => {
                db.collection('user_events').where('userId', '==', userId)
                .onSnapshot(async snap2 => {
                    const ids = new Set();
                    snap1.forEach(doc => ids.add(doc.id));
                    snap2.forEach(doc => ids.add(doc.data().eventId));

                    if(ids.size === 0) {
                        list.innerHTML = `<div style="text-align:center; padding:60px; opacity:0.4;">
                            <i class="fa-solid fa-folder-open fa-3x" style="margin-bottom:15px;"></i>
                            <p>No tienes eventos creados aún.<br>Dale al + para empezar.</p>
                        </div>`;
                        return;
                    }

                    let html = "";
                    for(let id of ids) {
                        const doc = await db.collection('events').doc(id).get();
                        if(doc.exists) {
                            const d = doc.data();
                            html += `
                            <div class="card" onclick="openEvent('${doc.id}')">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div>
                                        <h4 style="font-family:'Outfit'; color:white; font-size:1.2rem;">${d.name}</h4>
                                        <div style="display:flex; gap:12px; margin-top:6px; color:var(--muted); font-size:0.8rem;">
                                            <span><i class="fa-regular fa-calendar-days"></i> ${d.date ? d.date.split('-').reverse().join('/') : 'S/F'}</span>
                                            <span><i class="fa-solid fa-users"></i> ${d.participants.length}</span>
                                        </div>
                                    </div>
                                    <button onclick="event.stopPropagation(); toggleMenu('${doc.id}')" style="background:var(--surface2); border:none; color:var(--text); width:44px; height:44px; border-radius:14px;"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                                    <div id="menu-${doc.id}" class="dropdown-menu">
                                        <button class="dropdown-item" onclick="event.stopPropagation(); startEditEvent('${doc.id}')"><i class="fa-solid fa-pen-to-square"></i> Editar</button>
                                    </div>
                                </div>
                            </div>`;
                        }
                    }
                    list.innerHTML = html;
                });
            });
        }

        function openEvent(id) {
            db.collection('events').doc(id).onSnapshot(doc => {
                if(!doc.exists) return;
                currentEvent = {id: doc.id, ...doc.data()};
                document.getElementById('det-title').innerText = currentEvent.name;
                renderTab();
                showScreen('screen-detail');
            });
        }

        async function dbSaveEvent() {
            const name = document.getElementById('ev-name').value;
            const date = document.getElementById('ev-date').value;
            if(!name.trim()) return;
            const data = {
                name: name.trim(), date,
                participants: tempParticipants,
                participantsIds: tempParticipants.map(p => p.id)
            };
            if(editingEventId) await db.collection('events').doc(editingEventId).update(data);
            else {
                data.expenses = [];
                data.logs = [{u: auth.currentUser.displayName, a: "creó el evento", d: Date.now()}];
                await db.collection('events').add(data);
            }
            closeModal('modal-event');
        }

        async function dbSaveExpense() {
            const desc = document.getElementById('ex-desc').value;
            const amount = parseFloat(document.getElementById('ex-amount').value);
            if(!desc || isNaN(amount)) return;
            const included = Array.from(document.querySelectorAll('.ex-check:checked')).map(c => c.value);
            const payerId = document.getElementById('ex-payer').value;
            const payerName = currentEvent.participants.find(p => p.id === payerId).name;
            
            let expenses = [...(currentEvent.expenses || [])];
            const data = { id: editingExpenseId || Date.now(), desc, amount, payerId, payerName, includedIds: included, d: Date.now() };
            
            if(editingExpenseId) expenses = expenses.map(e => e.id === editingExpenseId ? data : e);
            else expenses.push(data);
            
            await db.collection('events').doc(currentEvent.id).update({ expenses });
            closeModal('modal-add-expense');
        }

        function switchTab(t, btn) {
            activeTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTab();
        }

        function renderTab() {
            const area = document.getElementById('tab-area');
            const ex = currentEvent.expenses || [];
            if(activeTab === 'gastos') {
                area.innerHTML = ex.slice().reverse().map(e => `
                    <div class="card" onclick='openExpenseModal(${JSON.stringify(e)})'>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div><b>${e.desc}</b><br><small style="color:var(--muted)">Pagó ${e.payerName}</small></div>
                            <b style="color:var(--accent)">${fmt.format(e.amount)}</b>
                        </div>
                    </div>`).join('');
            } else if(activeTab === 'saldos') {
                const b = {};
                currentEvent.participants.forEach(p => b[p.id] = 0);
                ex.forEach(e => {
                    b[e.payerId] += e.amount;
                    const share = e.amount / e.includedIds.length;
                    e.includedIds.forEach(id => b[id] -= share);
                });
                area.innerHTML = currentEvent.participants.map(p => `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <span>${p.name}</span>
                            <b style="color:${b[p.id] >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt.format(b[p.id])}</b>
                        </div>
                    </div>`).join('');
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('screen-loading').style.display = 'none';
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function openModalCreate() {
            editingEventId = null;
            tempParticipants = [{id: auth.currentUser.uid, name: auth.currentUser.displayName}];
            renderSetupParts();
            openModal('modal-event');
        }
        function renderSetupParts() {
            document.getElementById('setup-parts-list').innerHTML = tempParticipants.map((p, i) => `
                <div class="card" style="margin-bottom:8px; padding:12px; display:flex; justify-content:space-between;">
                    ${p.name} ${p.id !== auth.currentUser.uid ? `<i class="fa-solid fa-xmark" onclick="tempParticipants.splice(${i},1);renderSetupParts()"></i>` : ''}
                </div>`).join('');
        }
        function addPartToSetup() {
            const name = document.getElementById('ev-part-name').value;
            if(!name) return;
            tempParticipants.push({id: 't_'+Date.now(), name});
            document.getElementById('ev-part-name').value = '';
            renderSetupParts();
        }
        function openExpenseModal(e = null) {
            editingExpenseId = e ? e.id : null;
            document.getElementById('ex-payer').innerHTML = currentEvent.participants.map(p => `<option value="${p.id}" ${e && e.payerId==p.id?'selected':''}>${p.name}</option>`).join('');
            document.getElementById('ex-list-checks').innerHTML = currentEvent.participants.map(p => `
                <div style="display:flex; justify-content:space-between; padding:10px;">
                    ${p.name} <input type="checkbox" value="${p.id}" class="ex-check" ${!e || e.includedIds.includes(p.id)?'checked':''}>
                </div>`).join('');
            openModal('modal-add-expense');
        }
        function toggleMenu(id) {
            const m = document.getElementById('menu-'+id);
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }
        function shareEvent() {
            const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id;
            if(navigator.share) navigator.share({title: "Unite a " + currentEvent.name, url});
            else prompt("Copia link:", url);
        }
    </script>
</body>
</html>
